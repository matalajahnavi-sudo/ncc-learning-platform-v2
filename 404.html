<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    (function() {
      const isGithubPages = window.location.hostname.endsWith('github.io');
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const basePath = isGithubPages && pathParts.length > 0 ? `/${pathParts[0]}/` : '/';
      const routeParts = isGithubPages ? pathParts.slice(1) : pathParts;
      const routePath = `/${routeParts.join('/')}`.replace(/\/+/g, '/');
      const normalizedRoute = routePath === '/' ? '/' : routePath.replace(/\/$/, '');
      const target = `${basePath}#${normalizedRoute}${window.location.search}${window.location.hash}`;
      window.location.replace(target);
    })();
  </script>
</head>
<body style="margin:0; min-height:100vh; display:grid; place-items:center; background:#020202; color:#FFFFFF; font-family:Inter, Arial, sans-serif;">
  Redirecting to the app...
</body>
</html>
